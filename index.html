<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>optimizar - Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Specific styles for landing/login page */
        .landing-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* .login-card h1 removed since we're using logo-area now */

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .error-msg {
            color: #ef4444; /* red-500 */
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            display: none;
            font-size: 0.9rem;
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <div class="glass-container login-card">
            <div class="logo-area" style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 2rem;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="55" height="55" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                    <path d="M 20 45 v 20 h 20 v -35" />
                    <circle cx="20" cy="38" r="6" />
                    <circle cx="40" cy="24" r="6" />
                    <path d="M 40 50 l 30 -30" />
                    <path d="M 65 55 l -15 -15" />
                    <circle cx="65" cy="62" r="6" />
                    <path d="M 50 20 h 20 v 20" />
                </svg>
                <h1 style="font-size: 2.8rem; text-transform: lowercase; margin: 0; font-weight: 800;">optimizar</h1>
            </div>
            
            <form id="login-form">
                <div id="login-error" class="error-msg">Credenciales incorrectas</div>

                <div class="form-group">
                    <label for="email" class="input-label">correo electrónico:</label>
                    <input type="email" id="email" class="glass-input" required placeholder="tu@correo.com">
                </div>

                <div class="form-group">
                    <label for="password" class="input-label">contraseña:</label>
                    <input type="password" id="password" class="glass-input" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-optimizar login-btn">ingresar</button>
            </form>
        </div>
    </div>

    <!-- Auth Logic -->
    <script src="auth.js"></script>
    <script>
        // Si ya hay sesión, redirigir directo al dashboard
        if (getCurrentSession()) {
            window.location.href = 'dashboard.html';
        }

        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Bloquear botón mientras carga
            const btn = loginForm.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'verificando...';
            btn.disabled = true;

            const res = await login(email, password);
            
            btn.textContent = originalText;
            btn.disabled = false;

            if (res && res.success) {
                // Redirigir basado en el rol, o siempre al dashboard (donde el menu les da opciones)
                window.location.href = 'dashboard.html';
            } else {
                loginError.textContent = (res && res.message) ? res.message : 'Error desconocido al conectar con el servidor.';
                loginError.style.display = 'block';
            }
        });
    </script>
</body>
</html>
