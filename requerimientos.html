<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>optimizar - Requerimientos</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="auth-styles.css">

    <script src="auth.js"></script>
    <script>
        requireAuth(['admin', 'user']);
    </script>

    <style>
        .badge-prioridad {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: 0.04em;
        }
        .badge-alta  { background: rgba(239,68,68,0.2);  border: 1px solid rgba(239,68,68,0.5);  color: #fca5a5; }
        .badge-media { background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.5); color: #fde68a; }
        .badge-baja  { background: rgba(52,211,153,0.2); border: 1px solid rgba(52,211,153,0.5); color: #6ee7b7; }

        .req-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .req-card:hover { background: rgba(255,255,255,0.09); }

        .req-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .req-area {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-transform: capitalize;
        }
        .req-card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .req-card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 700px) { .req-card-body { grid-template-columns: 1fr; } }

        .req-field label {
            font-size: 0.75rem;
            color: var(--accent-blue);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .req-field p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.85);
            white-space: pre-wrap;
            margin: 0;
        }
        .req-field.full { grid-column: 1 / -1; }

        /* Comments section */
        .comments-section {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .comments-toggle {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-family);
            text-align: left;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: capitalize;
        }
        .comments-toggle:hover { color: #fff; }

        .comments-body { display: none; flex-direction: column; gap: 8px; }
        .comments-body.open { display: flex; }

        .comment-item {
            background: rgba(255,255,255,0.05);
            border-left: 3px solid var(--accent-blue);
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
        }
        .comment-meta {
            font-size: 0.75rem;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: capitalize;
        }
        .comment-text {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.85);
            margin: 0;
            white-space: pre-wrap;
        }

        .comment-form {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .comment-form textarea {
            flex: 1;
            min-height: 60px;
            resize: vertical;
            font-family: var(--font-family);
            font-size: 0.85rem;
        }
        .btn-comment {
            background: rgba(56,189,248,0.15);
            border: 1px solid rgba(56,189,248,0.4);
            color: #fff;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-family);
            align-self: flex-end;
            transition: all 0.2s;
            text-transform: capitalize;
        }
        .btn-comment:hover { background: rgba(56,189,248,0.3); }

        .btn-delete {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: var(--font-family);
            transition: all 0.2s;
            text-transform: capitalize;
        }
        .btn-delete:hover { background: rgba(239,68,68,0.3); }

        .priority-group-title {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin: 20px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .priority-group-title:first-child { margin-top: 0; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.35);
        }
        .empty-state p { font-size: 1rem; margin-top: 10px; }

        textarea.glass-input, .comment-form textarea.glass-input {
            resize: vertical;
            min-height: 80px;
            font-family: var(--font-family);
        }

        select.glass-input option {
            background: #1e1e2e;
            color: #ffffff;
        }

        /* Admin client info banner */
        .client-banner {
            background: rgba(167,139,250,0.12);
            border: 1px solid rgba(167,139,250,0.3);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.88rem;
            color: #c4b5fd;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .client-banner a {
            color: #a78bfa;
            font-size: 0.8rem;
            text-decoration: none;
            border: 1px solid rgba(167,139,250,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .client-banner a:hover { background: rgba(167,139,250,0.2); }

        /* Mention highlight in comment text */
        .mention-highlight {
            color: var(--accent-blue);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Navegación Superior -->
    <header class="glass-container top-nav">
        <div class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="40" height="40" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                <path d="M 20 45 v 20 h 20 v -35" />
                <circle cx="20" cy="38" r="6" />
                <circle cx="40" cy="24" r="6" />
                <path d="M 40 50 l 30 -30" />
                <path d="M 65 55 l -15 -15" />
                <circle cx="65" cy="62" r="6" />
                <path d="M 50 20 h 20 v 20" />
            </svg>
            <h1 class="brand-title">optimizar</h1>
        </div>
        <nav class="nav-buttons" id="main-nav"></nav>
    </header>

    <main class="admin-layout">

        <!-- Sidebar Izquierdo -->
        <aside class="glass-container admin-sidebar" id="sidebar">
            <!-- Generado dinámicamente según rol -->
        </aside>

        <!-- Contenido Principal -->
        <section class="glass-container admin-main-content">

            <!-- Banner info cliente (solo admin) -->
            <div id="client-banner" class="client-banner" style="display:none;"></div>

            <!-- Encabezado -->
            <div class="panel-header" style="margin-bottom: 24px;">
                <h2 style="margin:0;" id="page-title">Requerimientos</h2>
                <button class="btn-optimizar" id="btn-nuevo" onclick="openReqModal()" style="display:none;">+ Nuevo Requerimiento</button>
            </div>

            <!-- Lista -->
            <div id="requirements-list">
                <div class="empty-state" id="empty-state" style="display:none;">
                    <p>Aún no hay requerimientos cargados.</p>
                    <p style="font-size:0.85rem; margin-top:8px;">Hacé clic en <strong>+ Nuevo Requerimiento</strong> para agregar el primero.</p>
                </div>
            </div>

        </section>
    </main>

    <!-- Modal: Nuevo Requerimiento -->
    <div id="req-modal" class="modal-overlay" style="display:none;">
        <div class="glass-container modal-content scrollable">
            <h2 style="margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Nuevo Requerimiento</h2>
            <form id="req-form">

                <div class="form-group">
                    <label class="input-label">Área De Implementación:</label>
                    <input type="text" id="req-area" class="glass-input" placeholder="ej: Ventas, Marketing, Atención Al Cliente...">
                </div>

                <div class="form-group">
                    <label class="input-label">Tarea:</label>
                    <textarea id="req-tarea" class="glass-input" rows="3" placeholder="Descripción detallada de la tarea a automatizar..."></textarea>
                </div>

                <div class="form-group">
                    <label class="input-label">Cómo Se Realiza Actualmente:</label>
                    <textarea id="req-como" class="glass-input" rows="5" placeholder="Paso 1: ...&#10;Paso 2: ...&#10;Paso 3: ..."></textarea>
                </div>

                <div class="form-group">
                    <label class="input-label">Prioridad:</label>
                    <select id="req-prioridad" class="glass-input">
                        <option value="alta">Alta</option>
                        <option value="media" selected>Media</option>
                        <option value="baja">Baja</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="input-label">Tiempo Manual De La Tarea Hoy:</label>
                    <input type="text" id="req-tiempo" class="glass-input" placeholder="ej: 2 Horas / 45 Minutos">
                </div>

                <div id="req-error" style="display:none; color:#fca5a5; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px; margin-bottom:10px; font-size:0.9rem;"></div>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" onclick="closeReqModal()" class="btn-optimizar" style="background:rgba(255,255,255,0.05); border-color:transparent;">Cancelar</button>
                    <button type="submit" class="btn-optimizar" style="flex:1;">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const session = getCurrentSession();
        const isAdmin = session && session.role === 'admin';

        // Obtener userId del query param (admin viendo cliente específico)
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('userId');

        // userId que se usa para cargar requerimientos
        // Para clientes: usa su propio userId (el servidor resuelve al projectId)
        const viewUserId = isAdmin && targetUserId ? targetUserId : (session ? (session.userId || session.id) : null);

        let requirements = [];
        let clientInfo = null;

        // ── Init ─────────────────────────────────────────────────────────────
        async function init() {
            renderAuthenticatedNav('requerimientos');
            renderSidebar();

            // Si admin con cliente específico → mostrar banner
            if (isAdmin && targetUserId) {
                await loadClientInfo();
            }

            // Mostrar botón nuevo solo a clientes (no admins)
            if (!isAdmin) {
                document.getElementById('btn-nuevo').style.display = 'inline-block';
            }

            await loadRequirements();
        }

        // ── Sidebar según rol ─────────────────────────────────────────────────
        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (isAdmin && targetUserId) {
                // Admin viendo cliente específico
                sidebar.innerHTML = `
                    <a href="admin.html" class="sidebar-btn" style="text-decoration:none;font-size:0.9rem;">← Panel Admin</a>
                    <a href="dashboard.html?clientId=${targetUserId}" class="sidebar-btn" style="text-decoration:none;">Dashboard</a>
                    <button class="sidebar-btn active">Requerimientos</button>
                `;
            } else {
                // Cliente viendo sus propios requerimientos
                sidebar.innerHTML = `
                    <a href="dashboard.html" class="sidebar-btn" style="text-decoration:none;">Dashboard</a>
                    <button class="sidebar-btn active">Requerimientos</button>
                `;
            }
        }

        // ── Info del cliente (para banner admin) ──────────────────────────────
        async function loadClientInfo() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                clientInfo = users.find(u => u.id === targetUserId);
                if (clientInfo) {
                    const name = clientInfo.companyName || clientInfo.name;
                    document.getElementById('client-banner').style.display = 'flex';
                    document.getElementById('client-banner').innerHTML = `
                        <span>👤 Viendo requerimientos de: <strong>${name}</strong></span>
                        <a href="admin.html">← Volver Al Panel</a>
                    `;
                    document.getElementById('page-title').textContent = `Requerimientos — ${name}`;
                }
            } catch(e) { console.error(e); }
        }

        // ── Cargar requerimientos ─────────────────────────────────────────────
        async function loadRequirements() {
            if (!viewUserId) return;
            try {
                const projectId = session ? session.projectId : null;
                const url = projectId
                    ? `/api/requirements?projectId=${projectId}&userId=${viewUserId}`
                    : `/api/requirements?userId=${viewUserId}`;
                const res = await fetch(url);
                const data = await res.json();
                requirements = Array.isArray(data) ? data : [];
                await renderList();
            } catch(e) {
                console.error('Error cargando requerimientos:', e);
            }
        }

        // ── Renderizar lista ──────────────────────────────────────────────────
        async function renderList() {
            const container = document.getElementById('requirements-list');
            const empty = document.getElementById('empty-state');

            if (requirements.length === 0) {
                container.innerHTML = '';
                empty.style.display = 'block';
                container.appendChild(empty);
                return;
            }
            empty.style.display = 'none';

            const groups = { alta: [], media: [], baja: [] };
            requirements.forEach(r => {
                if (groups[r.prioridad]) groups[r.prioridad].push(r);
                else groups['baja'].push(r);
            });

            const groupLabels = { alta: '🔴 Alta Prioridad', media: '🟡 Media Prioridad', baja: '🟢 Baja Prioridad' };
            container.innerHTML = '';

            for (const [key, label] of Object.entries(groupLabels)) {
                if (groups[key].length === 0) continue;

                const groupTitle = document.createElement('div');
                groupTitle.className = 'priority-group-title';
                groupTitle.textContent = label;
                container.appendChild(groupTitle);

                for (const r of groups[key]) {
                    const comments = await loadComments(r.id);
                    const card = buildCard(r, comments);
                    container.appendChild(card);
                }
            }

            // Attach @mention listeners to all comment textareas after render
            setTimeout(() => {
                document.querySelectorAll('[id^="comment-input-"]').forEach(ta => {
                    if (!ta._mentionAttached) {
                        attachMentionListener(ta);
                        ta._mentionAttached = true;
                    }
                });
            }, 100);
        }

        // ── Cargar comentarios de un requerimiento ────────────────────────────
        async function loadComments(requirementId) {
            try {
                const res = await fetch(`/api/comments?requirementId=${requirementId}`);
                return await res.json();
            } catch(e) { return []; }
        }

        // ── Construir card ────────────────────────────────────────────────────
        function buildCard(r, comments) {
            const card = document.createElement('div');
            card.className = 'req-card';
            card.id = `card-${r.id}`;

            const deleteBtn = `<button class="btn-delete" onclick="deleteRequirement('${r.id}')">Eliminar</button>`;

            const commentsHtml = buildCommentsHtml(r.id, comments);

            card.innerHTML = `
                <div class="req-card-header">
                    <span class="req-area">${escapeHtml(r.area)}</span>
                    <div class="req-card-meta">
                        <span class="badge-prioridad badge-${r.prioridad}">${r.prioridad}</span>
                        ${deleteBtn}
                    </div>
                </div>
                <div class="req-card-body">
                    <div class="req-field full">
                        <label>Tarea</label>
                        <p>${escapeHtml(r.tarea)}</p>
                    </div>
                    <div class="req-field full">
                        <label>Cómo Se Realiza Actualmente</label>
                        <p>${escapeHtml(r.comoSeRealiza || '—')}</p>
                    </div>
                    ${r.tiempoManual ? `<div class="req-field">
                        <label>Tiempo Manual Hoy</label>
                        <p>${escapeHtml(r.tiempoManual)}</p>
                    </div>` : ''}
                    <div class="req-field">
                        <label>Fecha De Carga</label>
                        <p>${new Date(r.createdAt).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})}</p>
                    </div>
                    ${r.userName ? `<div class="req-field">
                        <label>Agregado Por</label>
                        <p>${escapeHtml(r.userName)}</p>
                    </div>` : ''}
                </div>
                ${commentsHtml}
            `;
            return card;
        }

        // ── HTML de comentarios ───────────────────────────────────────────────
        function buildCommentsHtml(reqId, comments) {
            const count = comments.length;
            const label = count === 0 ? 'Sin Comentarios' : `${count} Comentario${count > 1 ? 's' : ''}`;

            const commentsItems = comments.map(c => `
                <div class="comment-item">
                    <div class="comment-meta">${escapeHtml(c.adminName)} · ${new Date(c.createdAt).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})}</div>
                    <p class="comment-text">${escapeHtml(c.text)}</p>
                </div>
            `).join('');

            const commentForm = isAdmin ? `
                <div class="comment-form">
                    <textarea class="glass-input" id="comment-input-${reqId}" placeholder="Escribir comentario..."></textarea>
                    <button class="btn-comment" onclick="submitComment('${reqId}')">Comentar</button>
                </div>
            ` : '';

            return `
                <div class="comments-section">
                    <button class="comments-toggle" onclick="toggleComments('${reqId}')">
                        <span id="toggle-icon-${reqId}">▶</span> ${label}
                    </button>
                    <div class="comments-body" id="comments-body-${reqId}">
                        <div id="comments-list-${reqId}">${commentsItems}</div>
                        ${commentForm}
                    </div>
                </div>
            `;
        }

        // ── Toggle comentarios ────────────────────────────────────────────────
        function toggleComments(reqId) {
            const body = document.getElementById(`comments-body-${reqId}`);
            const icon = document.getElementById(`toggle-icon-${reqId}`);
            const isOpen = body.classList.toggle('open');
            icon.textContent = isOpen ? '▼' : '▶';
        }

        // ── Enviar comentario ─────────────────────────────────────────────────
        async function submitComment(reqId) {
            const input = document.getElementById(`comment-input-${reqId}`);
            const text = input.value.trim();
            if (!text) return;

            const btn = input.nextElementSibling;
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const res = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requirementId: reqId,
                        adminId: session.userId,
                        adminName: session.name,
                        text
                    })
                });
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    // Refrescar solo los comentarios de esta card
                    const comments = await loadComments(reqId);
                    const listEl = document.getElementById(`comments-list-${reqId}`);
                    listEl.innerHTML = comments.map(c => `
                        <div class="comment-item">
                            <div class="comment-meta">${escapeHtml(c.adminName)} · ${new Date(c.createdAt).toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'})}</div>
                            <p class="comment-text">${escapeHtml(c.text)}</p>
                        </div>
                    `).join('');
                    // Asegurarse de que el panel esté abierto
                    document.getElementById(`comments-body-${reqId}`).classList.add('open');
                    document.getElementById(`toggle-icon-${reqId}`).textContent = '▼';
                }
            } catch(e) {
                console.error('Error enviando comentario:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Comentar';
            }
        }

        // ── Eliminar requerimiento ────────────────────────────────────────────
        async function deleteRequirement(id) {
            if (!confirm('¿Eliminar este requerimiento?')) return;
            try {
                const res = await fetch(`/api/requirements/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) await loadRequirements();
            } catch(e) { console.error(e); }
        }

        // ── Modal ─────────────────────────────────────────────────────────────
        function openReqModal() {
            document.getElementById('req-form').reset();
            document.getElementById('req-error').style.display = 'none';
            document.getElementById('req-modal').style.display = 'flex';
        }
        function closeReqModal() {
            document.getElementById('req-modal').style.display = 'none';
        }
        document.getElementById('req-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('req-modal')) closeReqModal();
        });

        // ── Crear requerimiento ───────────────────────────────────────────────
        document.getElementById('req-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('req-error');
            errEl.style.display = 'none';

            const payload = {
                userId:        session ? (session.userId || session.id) : viewUserId,
                projectId:     session ? session.projectId : null,
                userName:      session ? session.name : 'Usuario',
                area:          document.getElementById('req-area').value.trim(),
                tarea:         document.getElementById('req-tarea').value.trim(),
                comoSeRealiza: document.getElementById('req-como').value.trim(),
                prioridad:     document.getElementById('req-prioridad').value,
                tiempoManual:  document.getElementById('req-tiempo').value.trim()
            };

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Creando...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/requirements', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    closeReqModal();
                    await loadRequirements();
                } else {
                    errEl.textContent = data.message || 'Error al crear el requerimiento.';
                    errEl.style.display = 'block';
                }
            } catch(err) {
                errEl.textContent = 'Error De Conexión Con El Servidor.';
                errEl.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Crear';
                submitBtn.disabled = false;
            }
        });

        function escapeHtml(text) {
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        init();

        // ── @Mention Autocomplete ──────────────────────────────────────────────────
        let allUsersCache = null;
        let mentionDropdown = null;
        let activeMentionTextarea = null;
        let mentionStart = -1;

        async function getAllUsersForMentions() {
          if (allUsersCache) return allUsersCache;
          try {
            const res = await fetch('/api/users');
            allUsersCache = await res.json();
          } catch(e) { allUsersCache = []; }
          return allUsersCache;
        }

        function createMentionDropdown() {
          if (mentionDropdown) mentionDropdown.remove();
          mentionDropdown = document.createElement('div');
          mentionDropdown.className = 'mention-dropdown';
          mentionDropdown.style.position = 'fixed';
          document.body.appendChild(mentionDropdown);
          return mentionDropdown;
        }

        function hideMentionDropdown() {
          if (mentionDropdown) mentionDropdown.style.display = 'none';
          activeMentionTextarea = null;
          mentionStart = -1;
        }

        async function handleMentionInput(e) {
          const textarea = e.target;
          const text = textarea.value;
          const cursorPos = textarea.selectionStart;

          // Find @ before cursor
          let atIdx = -1;
          for (let i = cursorPos - 1; i >= 0; i--) {
            if (text[i] === '@') { atIdx = i; break; }
            if (text[i] === ' ' || text[i] === '\n') break;
          }

          if (atIdx === -1) { hideMentionDropdown(); return; }

          const query = text.slice(atIdx + 1, cursorPos).toLowerCase();
          const users = await getAllUsersForMentions();
          const filtered = users.filter(u =>
            u.name.toLowerCase().includes(query) && u.id !== session.userId
          ).slice(0, 6);

          if (!filtered.length) { hideMentionDropdown(); return; }

          // Position dropdown near textarea
          const rect = textarea.getBoundingClientRect();
          const dd = createMentionDropdown();
          dd.style.left = rect.left + 'px';
          dd.style.top = (rect.bottom + 4) + 'px';
          dd.style.display = 'block';
          activeMentionTextarea = textarea;
          mentionStart = atIdx;

          dd.innerHTML = filtered.map((u, i) => `
            <div class="mention-item${i === 0 ? ' active' : ''}"
              data-name="${u.name.replace(/"/g, '&quot;')}"
              data-idx="${i}"
              onmousedown="insertMention('${u.name.replace(/'/g, "\\'")}')">
              <strong>@</strong>${escapeHtml(u.name)}
            </div>
          `).join('');
        }

        function insertMention(name) {
          if (!activeMentionTextarea) return;
          const ta = activeMentionTextarea;
          const text = ta.value;
          const cursorPos = ta.selectionStart;
          const before = text.slice(0, mentionStart);
          const after = text.slice(cursorPos);
          const firstName = name.split(' ')[0]; // use first name for @mention
          ta.value = before + '@' + firstName + ' ' + after;
          ta.selectionStart = ta.selectionEnd = before.length + firstName.length + 2;
          ta.focus();
          hideMentionDropdown();
        }

        // Attach mention listener to a textarea
        function attachMentionListener(textarea) {
          textarea.addEventListener('input', handleMentionInput);
          textarea.addEventListener('keydown', (e) => {
            if (!mentionDropdown || mentionDropdown.style.display === 'none') return;
            if (e.key === 'Escape') { hideMentionDropdown(); return; }
            const active = mentionDropdown.querySelector('.mention-item.active');
            const idx = active ? parseInt(active.dataset.idx) : 0;
            if (e.key === 'ArrowDown') {
              e.preventDefault();
              const next = mentionDropdown.querySelector(`[data-idx="${idx+1}"]`);
              if (next) { active?.classList.remove('active'); next.classList.add('active'); }
            } else if (e.key === 'ArrowUp') {
              e.preventDefault();
              const prev = mentionDropdown.querySelector(`[data-idx="${idx-1}"]`);
              if (prev) { active?.classList.remove('active'); prev.classList.add('active'); }
            } else if (e.key === 'Enter' && active) {
              e.preventDefault();
              active.dispatchEvent(new MouseEvent('mousedown'));
            }
          });
          textarea.addEventListener('blur', () => setTimeout(hideMentionDropdown, 150));
        }

    </script>

</body>
</html>
