<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>optimizar - Requerimientos</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="auth-styles.css">

    <script src="auth.js"></script>
    <script>
        requireAuth(['admin', 'user']);
    </script>

    <style>
        /* Priority badges */
        .badge-prioridad {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: 0.04em;
        }
        .badge-alta  { background: rgba(239,68,68,0.2);  border: 1px solid rgba(239,68,68,0.5);  color: #fca5a5; }
        .badge-media { background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.5); color: #fde68a; }
        .badge-baja  { background: rgba(52,211,153,0.2); border: 1px solid rgba(52,211,153,0.5); color: #6ee7b7; }

        /* Requirement cards */
        .req-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: background 0.2s;
        }
        .req-card:hover { background: rgba(255,255,255,0.09); }

        .req-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .req-area {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-transform: capitalize;
        }
        .req-card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .req-card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media (max-width: 700px) {
            .req-card-body { grid-template-columns: 1fr; }
        }
        .req-field label {
            font-size: 0.78rem;
            color: var(--accent-blue);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .req-field p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.85);
            white-space: pre-wrap;
            margin: 0;
        }
        .req-field.full { grid-column: 1 / -1; }

        .btn-delete {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 0.78rem;
            cursor: pointer;
            font-family: var(--font-family);
            transition: all 0.2s;
        }
        .btn-delete:hover {
            background: rgba(239,68,68,0.3);
        }

        /* Priority group header */
        .priority-group-title {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin: 20px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .priority-group-title:first-child { margin-top: 0; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.35);
        }
        .empty-state p { font-size: 1rem; margin-top: 10px; }

        /* textarea override */
        textarea.glass-input {
            resize: vertical;
            min-height: 80px;
            font-family: var(--font-family);
        }

        /* Select dropdown options contrast */
        select.glass-input option {
            background: #1e1e2e;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Navegación Superior -->
    <header class="glass-container top-nav">
        <div class="logo-area">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="40" height="40" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                <path d="M 20 45 v 20 h 20 v -35" />
                <circle cx="20" cy="38" r="6" />
                <circle cx="40" cy="24" r="6" />
                <path d="M 40 50 l 30 -30" />
                <path d="M 65 55 l -15 -15" />
                <circle cx="65" cy="62" r="6" />
                <path d="M 50 20 h 20 v 20" />
            </svg>
            <h1 class="brand-title">optimizar</h1>
        </div>
        <nav class="nav-buttons" id="main-nav"></nav>
    </header>

    <main class="admin-layout">

        <!-- Barra Lateral Izquierda (cliente) -->
        <aside class="glass-container admin-sidebar">
            <a href="dashboard.html" class="sidebar-btn" style="text-decoration:none;">Dashboard</a>
            <button class="sidebar-btn active" id="btn-requerimientos">Requerimientos</button>
        </aside>

        <!-- Contenido Principal -->
        <section class="glass-container admin-main-content">

            <!-- Encabezado -->
            <div class="panel-header" style="margin-bottom: 24px;">
                <h2 style="margin:0;">Requerimientos</h2>
                <button class="btn-optimizar" onclick="openReqModal()">+ Nuevo Requerimiento</button>
            </div>

            <!-- Lista de requerimientos -->
            <div id="requirements-list">
                <div class="empty-state" id="empty-state">
                    <p>Aún no hay requerimientos cargados.</p>
                    <p style="font-size:0.85rem; margin-top:8px;">Hacé clic en <strong>+ Nuevo Requerimiento</strong> para agregar el primero.</p>
                </div>
            </div>

        </section>
    </main>

    <!-- Modal: Nuevo Requerimiento -->
    <div id="req-modal" class="modal-overlay" style="display:none;">
        <div class="glass-container modal-content scrollable">
            <h2 style="margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Nuevo Requerimiento</h2>
            <form id="req-form">

                <div class="form-group">
                    <label class="input-label">Área De Implementación:</label>
                    <input type="text" id="req-area" class="glass-input" placeholder="ej: Ventas, Marketing, Atención al cliente..." required>
                </div>

                <div class="form-group">
                    <label class="input-label">Tarea:</label>
                    <textarea id="req-tarea" class="glass-input" rows="3" placeholder="Descripción detallada de la tarea a automatizar..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="input-label">Cómo Se Realiza Actualmente:</label>
                    <textarea id="req-como" class="glass-input" rows="5" placeholder="Paso 1: ...&#10;Paso 2: ...&#10;Paso 3: ..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="input-label">Prioridad:</label>
                    <select id="req-prioridad" class="glass-input" required>
                        <option value="alta">Alta</option>
                        <option value="media" selected>Media</option>
                        <option value="baja">Baja</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="input-label">Tiempo Manual De La Tarea Hoy:</label>
                    <input type="text" id="req-tiempo" class="glass-input" placeholder="ej: 2 horas / 45 minutos">
                </div>

                <div id="req-error" style="display:none; color:#fca5a5; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:10px; margin-bottom:10px; font-size:0.9rem;"></div>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" onclick="closeReqModal()" class="btn-optimizar" style="background:rgba(255,255,255,0.05); border-color:transparent;">Cancelar</button>
                    <button type="submit" class="btn-optimizar" style="flex:1;">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const session = getCurrentSession();
        let requirements = [];

        // ── Cargar requerimientos ────────────────────────────────────────────
        async function loadRequirements() {
            if (!session) return;
            try {
                const res = await fetch(`/api/requirements?userId=${session.userId}`);
                requirements = await res.json();
                renderList();
            } catch(e) {
                console.error('Error cargando requerimientos:', e);
            }
        }

        // ── Renderizar lista ─────────────────────────────────────────────────
        function renderList() {
            const container = document.getElementById('requirements-list');
            const empty = document.getElementById('empty-state');

            if (requirements.length === 0) {
                container.innerHTML = '';
                container.appendChild(empty);
                empty.style.display = 'block';
                return;
            }

            const groups = { alta: [], media: [], baja: [] };
            requirements.forEach(r => {
                if (groups[r.prioridad]) groups[r.prioridad].push(r);
                else groups['baja'].push(r);
            });

            const groupLabels = { alta: '🔴 Alta Prioridad', media: '🟡 Media Prioridad', baja: '🟢 Baja Prioridad' };
            let html = '';

            for (const [key, label] of Object.entries(groupLabels)) {
                if (groups[key].length === 0) continue;
                html += `<div class="priority-group-title">${label}</div>`;
                groups[key].forEach(r => {
                    html += `
                    <div class="req-card" style="margin-bottom:12px;">
                        <div class="req-card-header">
                            <span class="req-area">${escapeHtml(r.area)}</span>
                            <div class="req-card-meta">
                                <span class="badge-prioridad badge-${r.prioridad}">${r.prioridad}</span>
                                <button class="btn-delete" onclick="deleteRequirement('${r.id}')">Eliminar</button>
                            </div>
                        </div>
                        <div class="req-card-body">
                            <div class="req-field full">
                                <label>Tarea</label>
                                <p>${escapeHtml(r.tarea)}</p>
                            </div>
                            <div class="req-field full">
                                <label>Cómo Se Realiza Actualmente</label>
                                <p>${escapeHtml(r.comoSeRealiza || '—')}</p>
                            </div>
                            ${r.tiempoManual ? `<div class="req-field">
                                <label>Tiempo Manual Hoy</label>
                                <p>${escapeHtml(r.tiempoManual)}</p>
                            </div>` : ''}
                            <div class="req-field">
                                <label>Fecha De Carga</label>
                                <p>${new Date(r.createdAt).toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' })}</p>
                            </div>
                        </div>
                    </div>`;
                });
            }

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Modal ────────────────────────────────────────────────────────────
        function openReqModal() {
            document.getElementById('req-form').reset();
            document.getElementById('req-error').style.display = 'none';
            document.getElementById('req-modal').style.display = 'flex';
        }

        function closeReqModal() {
            document.getElementById('req-modal').style.display = 'none';
        }

        document.getElementById('req-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('req-modal')) closeReqModal();
        });

        // ── Crear requerimiento ──────────────────────────────────────────────
        document.getElementById('req-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('req-error');
            errEl.style.display = 'none';

            const payload = {
                userId:         session.userId,
                area:           document.getElementById('req-area').value.trim(),
                tarea:          document.getElementById('req-tarea').value.trim(),
                comoSeRealiza:  document.getElementById('req-como').value.trim(),
                prioridad:      document.getElementById('req-prioridad').value,
                tiempoManual:   document.getElementById('req-tiempo').value.trim()
            };

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.textContent = 'creando...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/requirements', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    closeReqModal();
                    await loadRequirements();
                } else {
                    errEl.textContent = data.message || 'Error al crear el requerimiento.';
                    errEl.style.display = 'block';
                }
            } catch(err) {
                errEl.textContent = 'Error de conexión con el servidor.';
                errEl.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Crear';
                submitBtn.disabled = false;
            }
        });

        // ── Eliminar requerimiento ───────────────────────────────────────────
        async function deleteRequirement(id) {
            if (!confirm('¿Eliminar este requerimiento?')) return;
            try {
                const res = await fetch(`/api/requirements/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) await loadRequirements();
            } catch(e) {
                console.error('Error eliminando requerimiento:', e);
            }
        }

        // ── Init ─────────────────────────────────────────────────────────────
        renderAuthenticatedNav('requerimientos');
        loadRequirements();
    </script>

</body>
</html>
